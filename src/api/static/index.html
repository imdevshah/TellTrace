<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TellTrace — Body Language Reader</title>
    <style>
        /*
           WHY these base styles?
           A clean, centered layout with a max
           width keeps content readable on any
           screen size. Sans-serif font and muted
           colors give it a simple, professional
           look without needing a CSS framework. */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f4;
            color: #2c2c2a;
            padding: 2rem 1rem;
        }
        .container {
            max-width: 720px;
            margin: 0 auto;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            color: #5f5e5a;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }

        /* 
           WHY a card style for the upload area?
           Visually groups the upload controls
           together, separate from the results
           that appear below. White background
           with a light border = simple "card".
           */
        .card {
            background: white;
            border: 1px solid #d3d1c7;
            border-radius: 12px;
            padding: 1.25rem;
            margin-bottom: 1rem;
        }

        input[type="file"] {
            display: block;
            margin-bottom: 0.75rem;
            font-size: 0.9rem;
        }

        button {
            background: #2c2c2a;
            color: white;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
        }
        button:hover { background: #444441; }
        button:disabled {
            background: #b4b2a9;
            cursor: not-allowed;
        }

        /* 
           WHY a separate style for the loading
           message?
           Video analysis takes 30+ seconds. Users
           need clear feedback that something is
           happening — otherwise they think it's
           broken and refresh, losing the request.
            */
        .loading {
            color: #854F0B;
            font-size: 0.9rem;
            display: none;
        }

        /* 
           WHY bar styles using CSS variables?
           Each signal bar's WIDTH is set dynamically
           via JavaScript (--pct custom property).
           The bar itself is just a div with a
           colored inner div whose width = --pct.
           */
        .signal-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.5rem;
        }
        .signal-label {
            width: 90px;
            font-size: 0.85rem;
            color: #5f5e5a;
        }
        .signal-bar-track {
            flex: 1;
            height: 8px;
            background: #e5e3da;
            border-radius: 4px;
            overflow: hidden;
        }
        .signal-bar-fill {
            height: 100%;
            width: var(--pct, 0%);
            border-radius: 4px;
        }
        .signal-value {
            width: 36px;
            text-align: right;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .observations {
            margin-top: 1rem;
            font-size: 0.9rem;
            line-height: 1.6;
        }
        .observations ul {
            margin-left: 1.2rem;
            margin-top: 0.4rem;
        }
        .recommendation {
            margin-top: 1rem;
            padding: 0.75rem;
            background: #E6F1FB;
            border-radius: 8px;
            font-size: 0.9rem;
            color: #0C447C;
        }

        #results { display: none; }

        /*
           WHY a table for video timeline?
           Each row = one sampled frame's results.
           A table is the clearest way to show
           multiple rows of timestamp + 3 scores.
            */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            margin-top: 0.5rem;
        }
        th, td {
            text-align: left;
            padding: 0.4rem 0.5rem;
            border-bottom: 1px solid #e5e3da;
        }
        th { color: #5f5e5a; font-weight: 500; }
    </style>
</head>
<body>
    <div class="container">
        <h1>TellTrace</h1>
        <p class="subtitle">AI-powered body language reader — upload an image or short video</p>

        <!-- 
             WHY two separate forms?
             Image and video go to DIFFERENT API
             endpoints (/analyse-image vs
             /analyse-video). Two forms with two
             buttons makes it explicit to the user
             which type of analysis they're starting.
              -->
        <div class="card">
            <strong>Analyse an image</strong>
            <input type="file" id="imageInput" accept="image/*">
            <button onclick="analyseImage()">Analyse image</button>
            <p class="loading" id="imageLoading">Analysing image...</p>
        </div>

        <div class="card">
            <strong>Analyse a video</strong>
            <input type="file" id="videoInput" accept="video/*">
            <button onclick="analyseVideo()">Analyse video</button>
            <p class="loading" id="videoLoading">
                Analysing video — this samples frames every 2 seconds
                and may take 30-60 seconds for short clips...
            </p>
        </div>

        <!-- 
             WHY one results container for both?
             Whether I analysed an image or video,
             results render into the SAME div. The
             JS functions decide what HTML to put
             inside based on which type of response
             came back.
              -->
        <div class="card" id="results"></div>
    </div>

    <script>
        // 
        // WHY a constant for the API base URL?
        // If I ever deploy this somewhere else
        // (not localhost), I have to change ONE line
        // instead of every fetch() call.
        // 
        const API_BASE = "http://127.0.0.1:8000";

        // 
        // WHY a helper function for signal bars?
        // Both image and video results show
        // confidence/stress/engagement bars.
        // Writing this once and reusing it avoids
        // duplicating the same HTML-building code
        // in two places.
        //
        // WHY these specific colors?
        // Green = confidence (positive), coral =
        // stress (negative), blue = engagement
        // (neutral/informational) — matches the
        // chart colors from my matplotlib
        // visualisation for visual consistency.
        // 
        function signalBar(label, value, color) {
            const pct = Math.round(value * 100);
            return `
                <div class="signal-row">
                    <span class="signal-label">${label}</span>
                    <div class="signal-bar-track">
                        <div class="signal-bar-fill" style="--pct: ${pct}%; background: ${color};"></div>
                    </div>
                    <span class="signal-value">${value.toFixed(2)}</span>
                </div>
            `;
        }

        //
        // WHY async function + try/catch?
        // fetch() is asynchronous — the response
        // takes time to arrive. 'await' pauses this
        // function until the response is ready.
        // try/catch handles network errors (server
        // not running, no internet) without crashing
        // the whole page.
        // 
        async function analyseImage() {
            const fileInput = document.getElementById("imageInput");
            const loading = document.getElementById("imageLoading");
            const results = document.getElementById("results");

            if (!fileInput.files[0]) {
                alert("Please choose an image first");
                return;
            }

            // 
            // WHY FormData?
            // File uploads over HTTP use a special
            // format called "multipart/form-data".
            // FormData is the browser's built-in
            // way to build this format — I can't
            // just send a file as JSON.
            // 
            const formData = new FormData();
            formData.append("file", fileInput.files[0]);

            loading.style.display = "block";
            results.style.display = "none";

            try {
                const response = await fetch(`${API_BASE}/analyse-image`, {
                    method: "POST",
                    body: formData,
                });
                const data = await response.json();

                if (data.error) {
                    results.innerHTML = `<p>${data.error}</p>`;
                } else {
                    renderImageResult(data);
                }

                results.style.display = "block";
            } catch (err) {
                results.innerHTML = `<p>Error connecting to API: ${err.message}</p>`;
                results.style.display = "block";
            } finally {
                loading.style.display = "none";
            }
        }

        // 
        // WHY a separate render function?
        // Keeps "fetching data" (analyseImage)
        // separate from "building HTML from data"
        // (renderImageResult) — same separation
        // pattern I used in classifier.py
        // (analyse vs print_report).
        //
        function renderImageResult(data) {
            const a = data.analysis;
            const results = document.getElementById("results");

            // 
            // WHY .map().join('')?
            // a.key_observations is an array of
            // strings. We turn each string into
            // an <li> element, then join them all
            // into one block of HTML to insert.
            // 
            const observationsList = a.key_observations
                .map(obs => `<li>${obs}</li>`)
                .join("");

            results.innerHTML = `
                <h3>${a.dominant_signal}</h3>
                ${signalBar("Confidence", a.confidence, "#1D9E75")}
                ${signalBar("Stress", a.stress, "#D85A30")}
                ${signalBar("Engagement", a.engagement, "#378ADD")}

                <div class="observations">
                    <strong>Key observations</strong>
                    <ul>${observationsList}</ul>
                </div>

                <div class="recommendation">
                    <strong>Recommendation:</strong> ${a.recommendation}
                </div>
            `;
        }

        async function analyseVideo() {
            const fileInput = document.getElementById("videoInput");
            const loading = document.getElementById("videoLoading");
            const results = document.getElementById("results");

            if (!fileInput.files[0]) {
                alert("Please choose a video first");
                return;
            }

            const formData = new FormData();
            formData.append("file", fileInput.files[0]);

            loading.style.display = "block";
            results.style.display = "none";

            try {
                const response = await fetch(`${API_BASE}/analyse-video`, {
                    method: "POST",
                    body: formData,
                });
                const data = await response.json();
                renderVideoResult(data);
                results.style.display = "block";
            } catch (err) {
                results.innerHTML = `<p>Error connecting to API: ${err.message}</p>`;
                results.style.display = "block";
            } finally {
                loading.style.display = "none";
            }
        }

        function renderVideoResult(data) {
            const results = document.getElementById("results");

            // 
            // WHY .map() to build table rows?
            // data.timeline is an array of frame
            // results (same structure as
            // timeline.json from process.py).
            // Each entry becomes one <tr> row.
            // 
            const rows = data.timeline.map(entry => {
                if (entry.no_person) {
                    return `
                        <tr>
                            <td>${entry.timestamp}s</td>
                            <td colspan="4">No person detected</td>
                        </tr>
                    `;
                }
                return `
                    <tr>
                        <td>${entry.timestamp}s</td>
                        <td>${entry.confidence.toFixed(2)}</td>
                        <td>${entry.stress.toFixed(2)}</td>
                        <td>${entry.engagement.toFixed(2)}</td>
                        <td>${entry.dominant_signal}</td>
                    </tr>
                `;
            }).join("");

            results.innerHTML = `
                <h3>Video timeline</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>Confidence</th>
                            <th>Stress</th>
                            <th>Engagement</th>
                            <th>Dominant signal</th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
            `;
        }
    </script>
</body>
</html>
